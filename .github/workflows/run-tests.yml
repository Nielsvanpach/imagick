name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-16.04]
        php: [5.4, 8.0, 7.4, 7.3, 7.2, 7.1, 7.0, 5.6, 5.5]
        imagemagic: [
          7.0.10-27,
          7.0.8-4,
          7.0.1-0,
          git7,
          6.9.2-0,
          6.8.7-0,
          6.7.8-0,
          git6
        ]
        exclude:
          - php: 5.4
            imagemagic: 6.8.7-0
        allow_failures:
          - imagemagic: git7
          - imagemagic: git6

    name: P${{ matrix.php }} - imagemagic${{ matrix.imagemagic }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Apt get commands
        run: |
          php -v
          sudo apt-get update
          sudo apt-get install -y fonts-urw-base35 || true
          sudo apt-get install -y libfreetype6-dev || true
          sudo apt-get install -y texlive-fonts-recommended || true

